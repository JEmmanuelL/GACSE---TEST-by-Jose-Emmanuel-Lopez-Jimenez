services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gacse-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=GacsE_2024!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "GacsE_2024!" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ..
      dockerfile: GACSE/Dockerfile
    container_name: gacse-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - TZ=America/Mexico_City
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=GACSeDB;User Id=sa;Password=GacsE_2024!;TrustServerCertificate=true;
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
