<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda del Día - GACSE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html">GACSE Médica</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="medicos.html">Médicos</a></li>
                    <li class="nav-item"><a class="nav-link" href="pacientes.html">Pacientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="citas.html">Agendar Cita</a></li>
                    <li class="nav-item"><a class="nav-link active" href="agenda.html">Agenda del Día</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-4">Consultar Agenda Médica</h4>
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small fw-bold">Médico</label>
                        <select class="form-select" id="medicoId">
                            <option value="">Seleccione Médico...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Fecha</label>
                        <input type="date" class="form-control" id="fecha">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100 fw-bold" onclick="Agenda.search()">
                            <i class="bi bi-search me-2"></i>Buscar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="alertContainer"></div>

        <div id="resultsContainer" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-bold" id="agendaTitle">Agenda para el Médico</h5>
                <span class="badge bg-primary px-3 py-2" id="fechaBadge"></span>
            </div>

            <div class="table-container shadow-sm p-0 overflow-hidden">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Hora</th>
                            <th>Paciente</th>
                            <th>Motivo</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="agendaTableBody">
                        <!-- Cargado dinámicamente -->
                    </tbody>
                </table>
            </div>
            
            <div id="noResults" class="text-center py-5 d-none">
                <i class="bi bi-calendar-x text-muted display-4"></i>
                <p class="mt-3 text-muted">No hay citas programadas para este día.</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/agenda.js"></script>
</body>
</html>
